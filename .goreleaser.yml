version: 2

project_name: launch-pilot

before:
  hooks:
    - go test ./...

builds:
  - main: ./cmd/launch-pilot
    binary: launch-pilot
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: A404coder
      name: homebrew-tap
    homepage: "https://github.com/A404coder/launch-pilot"
    description: "Visual control console for macOS launchd services"
    license: MIT
    install: |
      bin.install "launch-pilot"
